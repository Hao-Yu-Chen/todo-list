            document.getElementById('finance-modal-title').textContent = '编辑记账';
            
            // 填充表单数据
            document.getElementById('finance-id').value = record.id;
            document.getElementById('finance-amount').value = record.amount;
            document.getElementById('finance-category').value = record.category;
            document.getElementById('finance-note').value = record.note || '';
            
            const dateStr = record.dateTime.toISOString().split('T')[0];
            // 只保留小时和分钟，去掉秒
            const timeStr = record.dateTime.toTimeString().split(' ')[0].substring(0, 5);
            
            document.getElementById('finance-date').value = dateStr;
            document.getElementById('finance-time').value = timeStr;
            
            // 设置收支类型
            switchFinanceType(record.type);
            
            // 显示模态框
            financeModal.classList.remove('hidden');
            
            // 自动聚焦到金额输入框
            setTimeout(() => {
                document.getElementById('finance-amount').focus();
            }, 100);
        }
        
        // 关闭记账模态框
        function closeFinanceModal() {
            financeModal.classList.add('hidden');
            editingFinanceId = null;
            hideCategorySuggestions();
        }
        
        // 处理记账表单提交
        function handleFinanceFormSubmit(e) {
            e.preventDefault();
            
            const amount = parseFloat(document.getElementById('finance-amount').value);
            const category = document.getElementById('finance-category').value.trim();
            const note = document.getElementById('finance-note').value.trim();
            const date = document.getElementById('finance-date').value;
            const time = document.getElementById('finance-time').value;
            
            // 验证表单
            if (isNaN(amount) || amount <= 0) {
                showNotification('表单错误', '请输入有效的金额', 'error');
                return;
            }
            
            if (!category) {
                showNotification('表单错误', '请输入或选择类别', 'error');
                return;
            }
            
            const dateTime = new Date(`${date}T${time}`);
            
            // 创建或更新财务记录
            if (editingFinanceId) {
                // 更新现有记录
                const index = financeRecords.findIndex(r => r.id === editingFinanceId);
                if (index !== -1) {
                    financeRecords[index] = {
                        ...financeRecords[index],
                        type: currentFinanceType,
                        amount,
                        category,
                        note,
                        dateTime,
                        updatedAt: new Date()
                    };
                    showNotification('成功', '记账记录已更新', 'success');
                }
            } else {
                // 创建新记录
                const newRecord = {
                    id: generateId(),
                    type: currentFinanceType,
                    amount,
                    category,
                    note,
                    dateTime,
                    createdAt: new Date(),
                    updatedAt: new Date()
                };
                financeRecords.push(newRecord);
                showNotification('成功', '记账记录已创建', 'success');
            }
            
            // 保存数据并更新视图
            saveData();
            renderFinanceView();
            updateFinanceStats();
            
            // 关闭模态框
            closeFinanceModal();
        }
        
        // 打开记账详情模态框
        function openFinanceDetailModal(financeId) {
            const record = financeRecords.find(r => r.id === financeId);
            if (!record) return;
            
            // 填充记账详情
            financeDetailContent.innerHTML = `
                <div class="mb-4">
                    <div class="flex justify-between items-center mb-1">
                        <h3 class="text-lg font-semibold">${record.category}</h3>
                        <div class="inline-block px-2 py-0.5 rounded text-xs font-medium ${record.type === 'income' ? 'bg-income' : 'bg-expense'} text-white">
                            ${record.type === 'income' ? '收入' : '支出'}
                        </div>
                    </div>
                    <div class="text-xl font-bold ${record.type === 'income' ? 'text-income' : 'text-expense'}">
                        ${record.type === 'income' ? '+' : '-'}¥${record.amount.toFixed(2)}
                    </div>
                </div>
                
                <div class="space-y-3 text-sm">
                    <div class="flex">
                        <span class="text-gray-500 w-20">日期时间:</span>
                        <span>${formatDateTime(record.dateTime)}</span>
                    </div>
                    
                    ${record.note ? `
                    <div class="flex">
                        <span class="text-gray-500 w-20">备注:</span>
                        <span>${record.note}</span>
                    </div>
                    ` : ''}
                    
                    <div class="flex">
                        <span class="text-gray-500 w-20">创建时间:</span>
                        <span>${formatDateTime(record.createdAt)}</span>
                    </div>
                    
                    ${record.updatedAt.getTime() !== record.createdAt.getTime() ? `
                    <div class="flex">
                        <span class="text-gray-500 w-20">更新时间:</span>
                        <span>${formatDateTime(record.updatedAt)}</span>
                    </div>
                    ` : ''}
                </div>
            `;
            
            // 生成操作按钮
            financeActions.innerHTML = '';
            
            // 添加编辑和删除按钮
            addFinanceActionButton('编辑', 'info', () => openEditFinanceModal(record.id));
            addFinanceActionButton('删除', 'danger', () => {
                showConfirmDialog(
                    '删除记账记录',
                    '确定要删除这条记账记录吗？此操作无法恢复。',
                    () => deleteFinanceRecord(record.id)
                );
            });
            
            // 显示模态框
            financeDetailModal.classList.remove('hidden');
        }
        
        // 添加财务操作按钮
        function addFinanceActionButton(text, color, onClick) {
            const button = document.createElement('button');
            button.className = `px-3 py-2 text-sm rounded-md text-white bg-${color} hover:bg-${color}/90 transition-colors flex-1`;
            button.textContent = text;
            button.addEventListener('click', onClick);
            financeActions.appendChild(button);
        }
        
        // 关闭记账详情模态框
        function closeFinanceDetailModal() {
            financeDetailModal.classList.add('hidden');
        }
        
        // 删除记账记录
        function deleteFinanceRecord(financeId) {
            const index = financeRecords.findIndex(r => r.id === financeId);
            if (index !== -1) {
                financeRecords.splice(index, 1);
                
                saveData();
                renderFinanceView();
                updateFinanceStats();
                
                showNotification('成功', '记账记录已删除', 'success');
                closeFinanceDetailModal();
            }
        }
        
        // 切换类别建议显示
        function toggleCategorySuggestions() {
            if (categorySuggestions.classList.contains('hidden')) {
                showCategorySuggestions();
            } else {
                hideCategorySuggestions();
            }
        }
        
        // 显示类别建议
        function showCategorySuggestions() {
            updateCategorySuggestions();
            categorySuggestions.classList.remove('hidden');
        }
        
        // 隐藏类别建议
        function hideCategorySuggestions() {
            categorySuggestions.classList.add('hidden');
        }
        
        // 更新类别建议
        function updateCategorySuggestions() {
            categorySuggestions.innerHTML = '';
            
            const categories = currentFinanceType === 'income' ? incomeCategories : expenseCategories;
            const inputValue = financeCategoryInput.value.toLowerCase();
            
            // 过滤类别
            const filteredCategories = categories.filter(category => 
                category.toLowerCase().includes(inputValue)
            );
            
            // 显示建议
            filteredCategories.forEach(category => {
                const suggestion = document.createElement('div');
                suggestion.className = 'category-suggestion';
                suggestion.textContent = category;
                
                // 添加点击事件
                suggestion.addEventListener('click', () => {
                    financeCategoryInput.value = category;
                    hideCategorySuggestions();
                });
                
                categorySuggestions.appendChild(suggestion);
            });
            
            // 如果没有匹配的类别，显示提示
            if (filteredCategories.length === 0 && inputValue) {
                const noMatch = document.createElement('div');
                noMatch.className = 'px-3 py-2 text-gray-500 text-sm';
                noMatch.textContent = '没有匹配的类别，按回车添加新类别';
                categorySuggestions.appendChild(noMatch);
            }
        }
        
        // 过滤类别建议
        function filterCategorySuggestions() {
            updateCategorySuggestions();
            
            // 如果输入框为空，隐藏建议
            if (!financeCategoryInput.value.trim()) {
                hideCategorySuggestions();
            } else {
                categorySuggestions.classList.remove('hidden');
            }
        }
        
        // 处理类别输入框按键事件
        function handleCategoryKeydown(e) {
            if (e.key === 'Enter') {
                // 阻止回车键冒泡到表单，避免触发表单提交
                e.preventDefault();
                e.stopPropagation();
                
                const inputValue = financeCategoryInput.value.trim();
                
                // 如果输入不为空且不包含在现有类别中，添加新类别
                if (inputValue) {
                    // 根据当前收支类型选择正确的类别数组
                    const categories = currentFinanceType === 'income' ? incomeCategories : expenseCategories;
                    
                    if (!categories.includes(inputValue)) {
                        categories.push(inputValue);
                        saveData();
                        
                        // 显示添加成功的反馈
                        showNotification('成功', `已添加${currentFinanceType === 'income' ? '收入' : '支出'}类别: ${inputValue}`, 'success');
                        
                        // 更新类别建议列表
                        updateCategorySuggestions();
                    }
                    
                    // 不隐藏类别建议，让用户可以继续选择
                }
            } else if (e.key === 'Escape') {
                hideCategorySuggestions();
            }
        }
        
        // 打开设置模态框
        function openSettingsModal() {
            settingsModal.classList.remove('hidden');
        }
        
        // 关闭设置模态框
        function closeSettingsModal() {
            settingsModal.classList.add('hidden');
            
            // 保存设置
            saveData();
            
            // 如果默认视图改变，切换视图
            const newDefaultView = document.getElementById('default-view').value;
            if (newDefaultView !== currentView) {
                switchView(newDefaultView);
            }
            
            // 如果通知设置改变，重新设置通知检查
            if (document.getElementById('notification-toggle').checked) {
                setupNotificationCheck();
            } else {
                clearInterval(notificationCheckInterval);
            }
        }
        
        // 显示确认对话框
        function showConfirmDialog(title, message, onConfirm) {
            confirmTitle.textContent = title;
            confirmMessage.textContent = message;
            
            // 移除之前的事件监听器
            const newConfirmOkBtn = confirmOkBtn.cloneNode(true);
            confirmOkBtn.parentNode.replaceChild(newConfirmOkBtn, confirmOkBtn);
            
            // 添加新的事件监听器
            newConfirmOkBtn.addEventListener('click', () => {
                onConfirm();
                closeConfirmDialog();
            });
            
            confirmDialog.classList.remove('hidden');
        }
        
        // 关闭确认对话框
        function closeConfirmDialog() {
            confirmDialog.classList.add('hidden');
        }
        
        // 清除所有数据
        function clearAllData() {
            schedules = [];
            financeRecords = [];
            saveData();
            renderView();
            renderFinanceView();
            updateDailyProgress();
            updateFinanceStats();
            showNotification('成功', '所有数据已清除', 'success');
            closeSettingsModal();
        }
        
        // 显示通知 - 移动端优化
        function showNotification(title, message, type = 'info') {
            notificationTitle.textContent = title;
            notificationMessage.textContent = message;
            
            // 设置图标和颜色
            switch (type) {
                case 'success':
                    notificationIcon.innerHTML = '<i class="fa fa-check-circle text-xl"></i>';
                    notificationIcon.className = 'text-success';
                    break;
                case 'error':
                    notificationIcon.innerHTML = '<i class="fa fa-exclamation-circle text-xl"></i>';
                    notificationIcon.className = 'text-danger';
                    break;
                case 'warning':
                    notificationIcon.innerHTML = '<i class="fa fa-exclamation-triangle text-xl"></i>';
                    notificationIcon.className = 'text-warning';
                    break;
                default:
                    notificationIcon.innerHTML = '<i class="fa fa-info-circle text-xl"></i>';
                    notificationIcon.className = 'text-info';
            }
            
            // 显示通知
            notificationToast.classList.remove('hidden');
            
            // 清除之前的定时器
            if (notificationTimeout) {
                clearTimeout(notificationTimeout);
            }
            
            // 设置自动关闭定时器
            notificationTimeout = setTimeout(() => {
                closeNotification();
            }, 5000);
        }
        
        // 关闭通知
        function closeNotification() {
            notificationToast.classList.add('hidden');
            if (notificationTimeout) {
                clearTimeout(notificationTimeout);
                notificationTimeout = null;
            }
        }
        
        // 更新当日进度 - 移动端优化
        function updateDailyProgress() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            // 获取今天的所有日程
            const todaySchedules = schedules.filter(schedule => {
                return schedule.startTime >= today && schedule.startTime < tomorrow;
            });
            
            // 计算完成的日程数量
            const completedSchedules = todaySchedules.filter(schedule => schedule.status === 'completed');
            
            // 更新进度条
            const totalCount = todaySchedules.length;
            const completedCount = completedSchedules.length;
            const progressPercentage = totalCount > 0 ? (completedCount / totalCount) * 100 : 0;
            
            progressBar.style.width = `${progressPercentage}%`;
            completedCountEl.textContent = `${completedCount} 已完成`;
            totalCountEl.textContent = `共 ${totalCount} 项`;
            
            // 更新进行中的任务列表
            const ongoingSchedules = todaySchedules.filter(schedule => schedule.status === 'ongoing');
            
            ongoingTasksEl.innerHTML = '';
            
            if (ongoingSchedules.length > 0) {
                ongoingSchedules.forEach(schedule => {
                    const taskEl = document.createElement('div');
                    taskEl.className = 'bg-ongoing/10 border border-ongoing/20 rounded-md p-2 flex items-center justify-between mobile-schedule-item';
                    
                    const taskInfo = document.createElement('div');
                    taskInfo.className = 'flex-grow';
                    
                    const taskTitle = document.createElement('div');
                    taskTitle.className = 'font-medium text-sm';
                    taskTitle.textContent = schedule.title;
                    
                    const taskTime = document.createElement('div');
                    taskTime.className = 'text-xs text-gray-500';
                    taskTime.textContent = `${formatTime(schedule.startTime)} - ${formatTime(schedule.endTime)}`;
                    
                    taskInfo.appendChild(taskTitle);
                    taskInfo.appendChild(taskTime);
                    
                    const completeBtn = document.createElement('button');
                    completeBtn.className = 'ml-2 px-2 py-1 bg-success text-white text-xs rounded hover:bg-success/90 transition-colors';
                    completeBtn.textContent = '完成';
                    completeBtn.addEventListener('click', () => changeScheduleStatus(schedule.id, 'completed'));
                    
                    taskEl.appendChild(taskInfo);
                    taskEl.appendChild(completeBtn);
                    ongoingTasksEl.appendChild(taskEl);
                });
            } else {
                ongoingTasksEl.innerHTML = '<div class="text-sm text-gray-400 italic">暂无进行中的任务</div>';
            }
        }
        
        // 设置通知检查
        function setupNotificationCheck() {
            // 清除之前的定时器
            if (notificationCheckInterval) {
                clearInterval(notificationCheckInterval);
            }
            
            // 检查通知权限
            if ('Notification' in window && document.getElementById('notification-toggle').checked) {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        // 设置每分钟检查一次
                        notificationCheckInterval = setInterval(checkNotifications, 60000);
                    }
                });
            }
        }
        
        // 检查通知
        function checkNotifications() {
            if (!document.getElementById('notification-toggle').checked) return;
            
            const now = new Date();
            const fifteenMinutesLater = new Date(now.getTime() + 15 * 60 * 1000);
            
            // 查找15分钟内要开始且未开始的日程
            const upcomingSchedules = schedules.filter(schedule => {
                return schedule.startTime > now && 
                       schedule.startTime <= fifteenMinutesLater && 
                       schedule.status === 'pending';
            });
            
            // 显示通知
            upcomingSchedules.forEach(schedule => {
                // 浏览器通知
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('日程提醒', {
                        body: `${schedule.title} 将在 ${Math.round((schedule.startTime - now) / 60000)} 分钟后开始`,
                        icon: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%233b82f6"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>'
                    });
                }
                
                // 应用内通知
                showNotification(
                    '日程提醒',
                    `${schedule.title} 将在 ${Math.round((schedule.startTime - now) / 60000)} 分钟后开始`,
                    'warning'
                );
            });
        }
        
        // 导航到今天
        function goToToday() {
            currentDate = new Date();
            updateCurrentDate();
            renderView();
            
            // 同步更新记账模块
            if (currentContent === 'finance') {
                currentFinanceDate = new Date(currentDate);
                renderFinanceView();
                updateFinanceDateDisplay();
            }
        }
        
        // 导航到上一个时间单位
        function goToPrevious() {
            switch (currentView) {
                case 'day':
                    currentDate.setDate(currentDate.getDate() - 1);
                    break;
                case 'week':
                    currentDate.setDate(currentDate.getDate() - 7);
                    break;
                case 'month':
                    currentDate.setMonth(currentDate.getMonth() - 1);
                    break;
            }
            updateCurrentDate();
            renderView();
            
            // 同步更新记账模块
            if (currentContent === 'finance') {
                currentFinanceDate = new Date(currentDate);
                renderFinanceView();
                updateFinanceDateDisplay();
            }
        }
        
        // 导航到下一个时间单位
        function goToNext() {
            switch (currentView) {
                case 'day':
                    currentDate.setDate(currentDate.getDate() + 1);
                    break;
                case 'week':
                    currentDate.setDate(currentDate.getDate() + 7);
                    break;
                case 'month':
                    currentDate.setMonth(currentDate.getMonth() + 1);
                    break;
            }
            updateCurrentDate();
            renderView();
            
            // 同步更新记账模块
            if (currentContent === 'finance') {
                currentFinanceDate = new Date(currentDate);
                renderFinanceView();
                updateFinanceDateDisplay();
            }
        }
        
        // 辅助函数
        
        // 生成唯一ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }
        
        // 格式化日期时间
        function formatDateTime(date) {
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // 格式化时间
        function formatTime(date) {
            return date.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // 判断两个日期是否是同一天
        function isSameDay(date1, date2) {
            return date1.getFullYear() === date2.getFullYear() &&
                   date1.getMonth() === date2.getMonth() &&
                   date1.getDate() === date2.getDate();
        }
        
        // 获取状态对应的颜色类
        function getStatusColorClass(status) {
            switch (status) {
                case 'pending':
                    return 'bg-pending';
                case 'ongoing':
                    return 'bg-ongoing';
                case 'completed':
                    return 'bg-completed';
                case 'rescheduled':
                    return 'bg-rescheduled';
                case 'cancelled':
                    return 'bg-cancelled';
                default:
                    return 'bg-gray-500';
            }
        }
        
        // 获取状态文本
        function getStatusText(status) {
            switch (status) {
                case 'pending':
                    return '待开始';
                case 'ongoing':
                    return '进行中';
                case 'completed':
                    return '已完成';
                case 'rescheduled':
                    return '已改期';
                case 'cancelled':
                    return '已作废';
                default:
                    return '未知';
            }
        }
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
